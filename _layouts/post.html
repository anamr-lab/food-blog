<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 0;
      color: #333;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    a {
      color: #007acc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .back {
      margin-bottom: 20px;
      display: inline-block;
    }

    ul {
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="container">

    <a class="back" href="{{ '/' | relative_url }}">← Volver</a>

    <h1>{{ page.title }}</h1>

    <div>
      {{ content }}
    </div>

  </div>

</body>
</html>
